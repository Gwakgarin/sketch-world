<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SKETCH WORLD</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0f0f1a;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; font-family:Arial,sans-serif; color:#fff; gap:10px;
}
#title { font-size:11px; letter-spacing:3px; color:#444; }
#stage {
  position:relative; width:640px; height:480px;
  border:1px solid #2a2a3e; border-radius:4px; overflow:hidden;
}
#webcam { position:absolute; top:0; left:0; width:640px; height:480px; transform:scaleX(-1); object-fit:cover; z-index:1; }
#draw-canvas { position:absolute; top:0; left:0; width:640px; height:480px; z-index:2; }
#landmark-canvas { position:absolute; top:0; left:0; width:640px; height:480px; z-index:3; pointer-events:none; }
#hud { position:absolute; top:10px; left:12px; font-size:11px; color:#4ecdc4; letter-spacing:1px; text-shadow:0 1px 6px rgba(0,0,0,0.9); pointer-events:none; z-index:4; }
#loading-overlay { position:absolute; top:0; left:0; width:640px; height:480px; z-index:6; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); }
#loading-text { font-size:13px; color:#4ecdc4; letter-spacing:2px; margin-bottom:12px; }
#loading-bar-wrap { width:300px; height:3px; background:#222; border-radius:2px; }
#loading-bar { height:3px; background:#4ecdc4; border-radius:2px; width:0%; transition:width 0.3s; }
#result-overlay { position:absolute; top:0; left:0; width:640px; height:480px; z-index:5; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); }
#result-img { max-width:600px; max-height:400px; border:2px solid #4ecdc4; border-radius:4px; }
#result-actions { display:flex; gap:16px; margin-top:12px; align-items:center; }
#result-save  { font-size:11px; color:#2ecc71; cursor:pointer; letter-spacing:2px; border:1px solid #2ecc71; padding:6px 14px; border-radius:4px; transition:all 0.15s; }
#result-save:hover  { background:#2ecc71; color:#0f0f1a; }
#result-close { font-size:11px; color:#4ecdc4; cursor:pointer; letter-spacing:2px; border:1px solid #4ecdc4; padding:6px 14px; border-radius:4px; transition:all 0.15s; }
#result-close:hover { background:#4ecdc4; color:#0f0f1a; }
#color-bar { display:flex; align-items:center; gap:5px; width:640px; }
.cswatch {
  width:22px; height:22px; border-radius:3px; cursor:pointer; flex-shrink:0;
  border:2px solid transparent; transition:transform 0.1s, border-color 0.1s;
}
.cswatch:hover { transform:scale(1.2); }
.cswatch.active { border-color:#fff; box-shadow:0 0 0 1px #4ecdc4; }
.cswatch.light { border-color:#333; }
.cswatch.light.active { border-color:#4ecdc4; }
#color-custom {
  width:22px; height:22px; border-radius:3px; cursor:pointer;
  border:1px solid #444; padding:0; flex-shrink:0;
  -webkit-appearance:none; background:none; overflow:hidden;
}
#color-custom::-webkit-color-swatch-wrapper { padding:0; }
#color-custom::-webkit-color-swatch { border:none; border-radius:2px; }
.color-sep { width:1px; height:18px; background:#2a2a3e; flex-shrink:0; margin:0 3px; }
#color-label { font-size:10px; color:#555; letter-spacing:1px; flex-shrink:0; }
#brush-bar {
  display:flex; align-items:center; gap:8px;
  background:#1a1a2e; padding:8px 14px;
  border-radius:6px; border:1px solid #2a2a3e; width:640px;
}
.bar-sep { flex:1; }
.hist-btn {
  background:none; border:1px solid #333; color:#555;
  padding:5px 10px; border-radius:4px; font-size:10px;
  cursor:pointer; transition:all 0.15s;
}
.hist-btn:hover:not(:disabled) { border-color:#4ecdc4; color:#4ecdc4; }
.hist-btn:disabled { opacity:0.25; cursor:not-allowed; }
#style-bar { display:flex; align-items:center; gap:8px; width:640px; }
.style-btn {
  flex:1; background:#1a1a2e; border:1px solid #2a2a3e; color:#666;
  padding:8px 0; border-radius:4px; font-size:11px;
  cursor:pointer; letter-spacing:1px; transition:all 0.15s; text-align:center;
}
.style-btn:hover { border-color:#4ecdc4; color:#4ecdc4; }
.style-btn.active { border-color:#4ecdc4; color:#4ecdc4; background:#0d2a29; }
#toolbar {
  display:flex; align-items:center; gap:16px;
  background:#1a1a2e; padding:10px 18px;
  border-radius:6px; border:1px solid #2a2a3e;
  width:640px; justify-content:space-between;
}
.tg { display:flex; align-items:center; gap:8px; }
.lbl { font-size:10px; color:#555; letter-spacing:1px; }
input[type=range] { -webkit-appearance:none; width:80px; height:3px; background:#333; border-radius:2px; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:#4ecdc4; cursor:pointer; }
.btn { background:none; border:1px solid #333; color:#888; padding:5px 10px; border-radius:4px; font-size:10px; cursor:pointer; letter-spacing:1px; transition:all 0.15s; }
.btn:hover { border-color:#4ecdc4; color:#4ecdc4; }
.btn.danger:hover { border-color:#e74c3c; color:#e74c3c; }
#send-btn { background:#1a3a38; border:1px solid #4ecdc4; color:#4ecdc4; padding:7px 18px; border-radius:4px; font-size:11px; letter-spacing:2px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
#send-btn:hover { background:#4ecdc4; color:#0f0f1a; }
#send-btn:disabled { opacity:0.3; cursor:not-allowed; background:#1a3a38; color:#4ecdc4; }
#status { font-size:10px; color:#444; letter-spacing:1px; text-align:center; }
#status.active { color:#4ecdc4; }
#status.sending { color:#f39c12; }
#status.done { color:#2ecc71; }
#status.error { color:#e74c3c; }
#guide { font-size:10px; color:#333; letter-spacing:1px; text-align:center; }
</style>
</head>
<body>
<div id="title">SKETCH WORLD — Hand Gesture Drawing → AI Style Transfer</div>

<div id="stage">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="draw-canvas" width="640" height="480"></canvas>
  <canvas id="landmark-canvas" width="640" height="480"></canvas>
  <div id="hud">손 인식 대기 중...</div>
  <div id="loading-overlay">
    <div id="loading-text">AI 변환 중...</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>
  <div id="result-overlay">
    <img id="result-img" src="" alt="AI 결과">
    <div id="result-actions">
      <div id="result-save">SAVE PNG</div>
      <div id="result-close">계속 그리기</div>
    </div>
  </div>
</div>

<div id="color-bar">
  <span id="color-label">COLOR</span>
  <div class="cswatch active" data-color="#141414" style="background:#141414"></div>
  <div class="cswatch" data-color="#5a5a5a" style="background:#5a5a5a"></div>
  <div class="cswatch" data-color="#c0392b" style="background:#c0392b"></div>
  <div class="cswatch" data-color="#e67e22" style="background:#e67e22"></div>
  <div class="cswatch" data-color="#f1c40f" style="background:#f1c40f"></div>
  <div class="cswatch" data-color="#27ae60" style="background:#27ae60"></div>
  <div class="cswatch" data-color="#4ecdc4" style="background:#4ecdc4"></div>
  <div class="cswatch" data-color="#2980b9" style="background:#2980b9"></div>
  <div class="cswatch" data-color="#8e44ad" style="background:#8e44ad"></div>
  <div class="cswatch" data-color="#e91e63" style="background:#e91e63"></div>
  <div class="cswatch" data-color="#795548" style="background:#795548"></div>
  <div class="cswatch light" data-color="#f5f5f5" style="background:#f5f5f5"></div>
  <div class="color-sep"></div>
  <input type="color" id="color-custom" value="#141414" title="커스텀 색상">
</div>

<div id="brush-bar">
  <span class="lbl">BRUSH</span>
  <span style="font-size:10px;color:#4ecdc4;letter-spacing:1px;">PENCIL</span>
  <div class="bar-sep"></div>
  <button class="hist-btn" id="btn-undo" disabled>↩ UNDO</button>
  <button class="hist-btn" id="btn-redo" disabled>↪ REDO</button>
</div>

<div id="style-bar">
  <button class="style-btn active" data-style="watercolor">🎨 수채화</button>
  <button class="style-btn" data-style="oilpainting">🖼 유화</button>
  <button class="style-btn" data-style="anime">✨ 애니</button>
  <button class="style-btn" data-style="sketch">✏️ 펜스케치</button>
</div>

<div id="toolbar">
  <div class="tg">
    <span class="lbl">SIZE</span>
    <input type="range" id="brush-size" min="2" max="28" value="6">
    <span id="size-val" style="font-size:10px;color:#555;min-width:18px">6</span>
  </div>
  <div class="tg">
    <span class="lbl">OPACITY</span>
    <input type="range" id="brush-opacity" min="20" max="100" value="90">
    <span id="opacity-val" style="font-size:10px;color:#555;min-width:28px">90%</span>
  </div>
  <div class="tg">
    <button class="btn danger" id="btn-clear">CLEAR</button>
    <button class="btn" id="btn-save">SAVE PNG</button>
  </div>
  <button id="send-btn">→ AI 변환</button>
</div>

<div id="status">웹캠 시작 중...</div>
<div id="guide">✏ 검지 → 그리기 &nbsp;|&nbsp; ✊ 주먹 → 지우기 &nbsp;|&nbsp; ✌ 검지+중지 → 멈춤 &nbsp;|&nbsp; Ctrl+Z / Ctrl+Shift+Z</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
const video          = document.getElementById('webcam');
const drawCanvas     = document.getElementById('draw-canvas');
const ldCanvas       = document.getElementById('landmark-canvas');
const dctx           = drawCanvas.getContext('2d');
const lctx           = ldCanvas.getContext('2d');
const hud            = document.getElementById('hud');
const statusEl       = document.getElementById('status');
const sendBtn        = document.getElementById('send-btn');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingBar     = document.getElementById('loading-bar');
const loadingText    = document.getElementById('loading-text');
const resultOverlay  = document.getElementById('result-overlay');
const resultImg      = document.getElementById('result-img');

const COMFY_URL = 'http://127.0.0.1:8000';

const STYLES = {
  watercolor: {
    label: '수채화', model: 'dreamshaper_8.safetensors',
    steps: 28, cfg: 9.0, denoise: 0.65,
    positive: 'watercolor painting, soft flowing brushstrokes, delicate color washes, white paper texture, loose painterly illustration, pastel tones, high quality art',
    negative: 'photorealistic, 3d render, harsh lines, noise, blurry, low quality, dark',
  },
  oilpainting: {
    label: '유화', model: 'dreamshaper_8.safetensors',
    steps: 28, cfg: 9.0, denoise: 0.72,
    positive: 'oil painting, thick impasto brushstrokes, rich vibrant colors, canvas texture, impressionist style, fine art, high quality painting',
    negative: 'photorealistic, digital art, flat colors, noise, blurry, low quality, anime',
  },
  anime: {
    label: '애니', model: 'dreamshaper_8.safetensors',
    steps: 28, cfg: 9.0, denoise: 0.65,
    positive: 'anime style illustration, clean sharp lines, vibrant colors, cel shading, studio ghibli, high quality anime art',
    negative: 'photorealistic, 3d render, noise, blurry, low quality, dark, western cartoon',
  },
  sketch: {
    label: '펜스케치', model: 'dreamshaper_8.safetensors',
    steps: 28, cfg: 9.0, denoise: 0.55,
    positive: 'pen and ink sketch, fine linework, black and white illustration, detailed crosshatching, artistic drawing, high quality',
    negative: 'color, photorealistic, blurry, low quality, noise, painting',
  },
};

let currentStyle = 'watercolor';
let currentColor = '#141414';
let brushSize    = 6;
let brushOpacity = 0.9;
let lastX = null, lastY = null;
let prevGesture  = null;

const MAX_UNDO  = 20;
const undoStack = [];
const redoStack = [];

function saveState() {
  undoStack.push(dctx.getImageData(0, 0, 640, 480));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack.length = 0;
  syncHistoryBtns();
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(dctx.getImageData(0, 0, 640, 480));
  dctx.putImageData(undoStack.pop(), 0, 0);
  syncHistoryBtns();
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push(dctx.getImageData(0, 0, 640, 480));
  dctx.putImageData(redoStack.pop(), 0, 0);
  syncHistoryBtns();
}

function syncHistoryBtns() {
  document.getElementById('btn-undo').disabled = undoStack.length === 0;
  document.getElementById('btn-redo').disabled = redoStack.length === 0;
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function hexToColorPrompt(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  const l = (max+min)/2;
  if (max-min < 0.12) {
    if (l < 0.2) return 'dark black tones, monochrome';
    if (l > 0.8) return 'light white tones, bright';
    return 'gray tones, neutral colors';
  }
  let h = 0;
  if (max===r) h = ((g-b)/(max-min)+6)%6;
  else if (max===g) h = (b-r)/(max-min)+2;
  else h = (r-g)/(max-min)+4;
  h = h/6*360;
  if (h < 20)  return 'red color tones, warm red hues';
  if (h < 45)  return 'orange color tones, warm orange hues';
  if (h < 70)  return 'yellow color tones, warm yellow hues';
  if (h < 150) return 'green color tones, natural green hues';
  if (h < 200) return 'cyan teal color tones, cool teal hues';
  if (h < 260) return 'blue color tones, cool blue hues';
  if (h < 310) return 'purple violet color tones';
  return 'pink magenta color tones, warm pink hues';
}

function setColor(hex) {
  currentColor = hex;
  document.querySelectorAll('.cswatch').forEach(s => s.classList.remove('active'));
  const match = document.querySelector(`.cswatch[data-color="${hex}"]`);
  if (match) match.classList.add('active');
  document.getElementById('color-custom').value = hex.length === 7 ? hex : '#141414';
}

document.querySelectorAll('.cswatch').forEach(sw => {
  sw.addEventListener('click', () => setColor(sw.dataset.color));
});

document.getElementById('color-custom').addEventListener('input', e => {
  currentColor = e.target.value;
  document.querySelectorAll('.cswatch').forEach(s => s.classList.remove('active'));
});


document.querySelectorAll('.style-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStyle = btn.dataset.style;
    statusEl.textContent = `스타일: ${STYLES[currentStyle].label}`;
    statusEl.className = 'active';
  });
});

document.getElementById('brush-size').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
  document.getElementById('size-val').textContent = brushSize;
});

document.getElementById('brush-opacity').addEventListener('input', e => {
  brushOpacity = parseInt(e.target.value) / 100;
  document.getElementById('opacity-val').textContent = e.target.value + '%';
});

function drawSketch(x1, y1, x2, y2) {
  dctx.lineCap = 'round'; dctx.lineJoin = 'round';

  dctx.beginPath(); dctx.globalAlpha = brushOpacity * 0.85;
  dctx.strokeStyle = currentColor; dctx.lineWidth = brushSize;
  dctx.moveTo(x1,y1); dctx.lineTo(x2,y2); dctx.stroke();

  const fibers = Math.ceil(brushSize * 0.6);
  for (let i = 0; i < fibers; i++) {
    const t = Math.random();
    const px = x1 + (x2-x1)*t, py = y1 + (y2-y1)*t;
    const sp = brushSize * 0.55;
    dctx.beginPath();
    dctx.globalAlpha = brushOpacity * (0.08 + Math.random()*0.12);
    dctx.lineWidth = 0.6 + Math.random()*0.8;
    dctx.moveTo(px + (Math.random()-.5)*sp,     py + (Math.random()-.5)*sp);
    dctx.lineTo(px + (Math.random()-.5)*sp*1.4, py + (Math.random()-.5)*sp*1.4);
    dctx.stroke();
  }
  dctx.beginPath(); dctx.globalAlpha = brushOpacity * 0.12;
  dctx.lineWidth = brushSize * 1.8;
  dctx.moveTo(x1,y1); dctx.lineTo(x2,y2); dctx.stroke();

  dctx.globalAlpha = 1.0;
}

function eraseAt(x, y) {
  dctx.globalCompositeOperation = 'destination-out';
  dctx.beginPath(); dctx.arc(x, y, brushSize * 2.5, 0, Math.PI*2);
  dctx.fillStyle = 'rgba(0,0,0,1)'; dctx.fill();
  dctx.globalCompositeOperation = 'source-over';
}

function getGesture(lm) {
  const indexUp  = lm[8].y  < lm[6].y;
  const middleUp = lm[12].y < lm[10].y;
  const ringUp   = lm[16].y < lm[14].y;
  const pinkyUp  = lm[20].y < lm[18].y;
  if (!indexUp && !middleUp && !ringUp && !pinkyUp) return 'erase';
  if (indexUp && middleUp) return 'idle';
  if (indexUp && !middleUp) return 'draw';
  return 'idle';
}

const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.6 });

hands.onResults(results => {
  lctx.clearRect(0, 0, 640, 480);
  if (!results.multiHandLandmarks?.length) {
    hud.textContent = '손 인식 대기 중...'; hud.style.color = '#444';
    lastX = null; lastY = null; prevGesture = null; return;
  }
  const lm = results.multiHandLandmarks[0];
  const tipX = (1 - lm[8].x) * 640, tipY = lm[8].y * 480;
  const gesture = getGesture(lm);

  if (prevGesture !== 'draw'  && gesture === 'draw')  saveState();
  if (prevGesture !== 'erase' && gesture === 'erase') saveState();

  const hudText  = { draw:'✏ 그리는 중', erase:'✊ 지우기', idle:'✌ 멈춤' };
  const hudColor = { draw:'#4ecdc4', erase:'#e74c3c', idle:'#f39c12' };
  hud.textContent = hudText[gesture]; hud.style.color = hudColor[gesture];

  if (gesture === 'draw') {
    if (lastX !== null) drawSketch(lastX, lastY, tipX, tipY);
    lastX = tipX; lastY = tipY;
  } else if (gesture === 'erase') {
    eraseAt(tipX, tipY); lastX = null; lastY = null;
  } else {
    lastX = null; lastY = null;
  }

  prevGesture = gesture;
  drawOverlay(lm, tipX, tipY, gesture);
});

function drawOverlay(lm, tipX, tipY, gesture) {
  const conn = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
  lctx.strokeStyle = 'rgba(78,205,196,0.25)'; lctx.lineWidth = 1;
  conn.forEach(([a,b]) => {
    lctx.beginPath();
    lctx.moveTo((1-lm[a].x)*640, lm[a].y*480);
    lctx.lineTo((1-lm[b].x)*640, lm[b].y*480);
    lctx.stroke();
  });
  lm.forEach((p,i) => {
    if (i === 8) return;
    lctx.beginPath(); lctx.arc((1-p.x)*640, p.y*480, 2.5, 0, Math.PI*2);
    lctx.fillStyle = 'rgba(78,205,196,0.4)'; lctx.fill();
  });
  const c = { draw:'#4ecdc4', erase:'#e74c3c', idle:'#f39c12' }[gesture];
  lctx.beginPath(); lctx.arc(tipX, tipY, brushSize/2+5, 0, Math.PI*2);
  lctx.strokeStyle = c; lctx.lineWidth = 1.5; lctx.stroke();
  lctx.beginPath(); lctx.strokeStyle = c; lctx.lineWidth = 1;
  lctx.moveTo(tipX-10, tipY); lctx.lineTo(tipX+10, tipY);
  lctx.moveTo(tipX, tipY-10); lctx.lineTo(tipX, tipY+10);
  lctx.stroke();
}

(async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{width:640,height:480,facingMode:'user'} });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      statusEl.textContent = '손을 화면 앞에 올려주세요'; statusEl.className = 'active';
      const cam = new Camera(video, { onFrame: async () => { await hands.send({image:video}); }, width:640, height:480 });
      cam.start();
    };
  } catch(e) {
    statusEl.textContent = '웹캠 오류: ' + e.message; statusEl.className = 'error';
  }
})();

document.getElementById('btn-clear').addEventListener('click', () => {
  saveState();
  dctx.clearRect(0, 0, 640, 480);
  lastX = null; lastY = null;
});

document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    if (e.key === 'y' || (e.key === 'z' && e.shiftKey)) { e.preventDefault(); redo(); }
  }
});

function saveImage(src) {
  const img = new Image(); img.crossOrigin = 'anonymous';
  img.onload = () => {
    const tmp = document.createElement('canvas');
    tmp.width = img.naturalWidth; tmp.height = img.naturalHeight;
    tmp.getContext('2d').drawImage(img, 0, 0);
    const link = document.createElement('a');
    link.download = 'ai_result_' + Date.now() + '.png';
    link.href = tmp.toDataURL('image/png'); link.click();
  };
  img.src = src;
}

document.getElementById('btn-save').addEventListener('click', () => {
  if (resultOverlay.style.display === 'flex' && resultImg.src) {
    saveImage(resultImg.src); return;
  }
  const tmp = document.createElement('canvas'); tmp.width=640; tmp.height=480;
  const tctx = tmp.getContext('2d');
  tctx.save(); tctx.translate(640,0); tctx.scale(-1,1);
  tctx.drawImage(video,0,0,640,480); tctx.restore();
  tctx.drawImage(drawCanvas,0,0);
  const link = document.createElement('a');
  link.download = 'sketch_' + Date.now() + '.png';
  link.href = tmp.toDataURL('image/png'); link.click();
});

document.getElementById('result-save').addEventListener('click', () => saveImage(resultImg.src));

document.getElementById('result-close').addEventListener('click', () => {
  resultOverlay.style.display = 'none';
  dctx.clearRect(0, 0, 640, 480);
  sendBtn.disabled = false;
  statusEl.textContent = '손을 화면 앞에 올려주세요'; statusEl.className = 'active';
});

function prepareSketchForAI() {
  const src = document.createElement('canvas'); src.width=640; src.height=480;
  const sctx = src.getContext('2d');
  sctx.fillStyle = '#ffffff'; sctx.fillRect(0,0,640,480);
  sctx.drawImage(drawCanvas,0,0);

  const dst = document.createElement('canvas'); dst.width=640; dst.height=480;
  const dc = dst.getContext('2d');
  dc.filter = 'contrast(4) brightness(1.1)';
  dc.drawImage(src,0,0);
  dc.filter = 'none';

  const id = dc.getImageData(0,0,640,480);
  const d = id.data;
  for (let i=0; i<d.length; i+=4) {
    const v = (0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]) < 180 ? 0 : 255;
    d[i]=d[i+1]=d[i+2]=v; d[i+3]=255;
  }
  dc.putImageData(id,0,0);
  return dst.toDataURL('image/png');
}

sendBtn.addEventListener('click', async () => {
  sendBtn.disabled = true;
  showLoading('스케치 캡처 중...', 10);
  const base64Image = prepareSketchForAI();

  try {
    showLoading('ComfyUI에 이미지 전송 중...', 25);
    const filename = await uploadImage(base64Image);

    showLoading(`${STYLES[currentStyle].label} 스타일 변환 중...`, 40);
    const promptId = await runWorkflow(filename);

    showLoading('AI 생성 중... (30초~1분)', 55);
    const outputImage = await pollResult(promptId);

    showLoading('완성!', 100);
    await new Promise(r => setTimeout(r, 500));
    hideLoading();
    showResult(outputImage);
    statusEl.textContent = `✓ ${STYLES[currentStyle].label} 변환 완료!`; statusEl.className = 'done';
  } catch(e) {
    hideLoading();
    statusEl.textContent = '오류: ' + e.message; statusEl.className = 'error';
    sendBtn.disabled = false;
  }
});

async function uploadImage(base64DataURL) {
  const base64 = base64DataURL.split(',')[1];
  const byteString = atob(base64);
  const ab = new ArrayBuffer(byteString.length);
  const ia = new Uint8Array(ab);
  for (let i=0; i<byteString.length; i++) ia[i] = byteString.charCodeAt(i);
  const blob = new Blob([ab], {type:'image/png'});
  const formData = new FormData();
  formData.append('image', blob, 'sketch_' + Date.now() + '.png');
  formData.append('overwrite', 'true');
  const res = await fetch(`${COMFY_URL}/upload/image`, { method:'POST', body:formData });
  if (!res.ok) throw new Error('업로드 실패: ' + res.status);
  return (await res.json()).name;
}

async function runWorkflow(inputFilename) {
  const s = STYLES[currentStyle];
  const prompt = {
    "1":  { class_type:'LoadImage',            inputs:{ image: inputFilename } },
    "9":  { class_type:'ImageScale',            inputs:{ image:['1',0], upscale_method:'nearest-exact', width:512, height:512, crop:'disabled' } },
    "2":  { class_type:'CheckpointLoaderSimple',inputs:{ ckpt_name: s.model } },
    "10": { class_type:'ControlNetLoader',      inputs:{ control_net_name: 'control_scribble.pth' } },
    "5":  { class_type:'CLIPTextEncode',        inputs:{ text: s.positive + ', ' + hexToColorPrompt(currentColor), clip:['2',1] } },
    "6":  { class_type:'CLIPTextEncode',        inputs:{ text: s.negative, clip:['2',1] } },
    "11": { class_type:'ControlNetApply',       inputs:{ conditioning:['5',0], control_net:['10',0], image:['9',0], strength: 1.1 } },
    "12": { class_type:'EmptyLatentImage',      inputs:{ width:512, height:512, batch_size:1 } },
    "4":  { class_type:'KSampler',              inputs:{
      model:['2',0], positive:['11',0], negative:['6',0], latent_image:['12',0],
      seed: Math.floor(Math.random()*999999999),
      steps: s.steps, cfg: s.cfg, denoise: 1.0,
      sampler_name: 'dpmpp_2m', scheduler: 'karras',
    }},
    "7":  { class_type:'VAEDecode', inputs:{ samples:['4',0], vae:['2',2] } },
    "8":  { class_type:'SaveImage', inputs:{ images:['7',0], filename_prefix:'sketch_world' } },
  };
  const res = await fetch(`${COMFY_URL}/prompt`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({prompt}) });
  if (!res.ok) throw new Error('워크플로우 실패: ' + res.status);
  return (await res.json()).prompt_id;
}

async function pollResult(promptId) {
  return new Promise((resolve, reject) => {
    let elapsed = 0;
    const interval = setInterval(async () => {
      elapsed += 2;
      updateLoadingBar(Math.min(55 + elapsed * 1.5, 95));
      try {
        const history = await (await fetch(`${COMFY_URL}/history/${promptId}`)).json();
        if (history[promptId]?.outputs) {
          clearInterval(interval);
          const imgNode = Object.values(history[promptId].outputs).find(o => o.images?.length);
          if (imgNode) resolve(imgNode.images[0]);
          else reject(new Error('결과 이미지 없음'));
        }
      } catch(_) {}
      if (elapsed > 180) { clearInterval(interval); reject(new Error('타임아웃')); }
    }, 2000);
  });
}

function showResult(imageInfo) {
  resultImg.src = `${COMFY_URL}/view?filename=${imageInfo.filename}&subfolder=${imageInfo.subfolder||''}&type=output`;
  resultOverlay.style.display = 'flex';
}

function showLoading(text, pct) {
  loadingText.textContent = text;
  loadingBar.style.width = pct + '%';
  loadingOverlay.style.display = 'flex';
}
function updateLoadingBar(pct) { loadingBar.style.width = pct + '%'; }
function hideLoading() { loadingOverlay.style.display = 'none'; loadingBar.style.width = '0%'; }
</script>
